<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>直感！図形あそび</title>
    
    <!-- Google Fonts: M PLUS Rounded 1c -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">

    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary-color: #6a11cb;
            --secondary-color: #2575fc;
            --accent-color: #ff4b1f;
            --text-color: #333;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(255, 255, 255, 0.4);
            --tab-active-bg: rgba(255, 255, 255, 0.95);
            --tab-inactive-bg: rgba(255, 255, 255, 0.5);
            --card-bg: #ffffff;
            --check-btn-gradient: linear-gradient(to right, #f46b45, #eea849);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            overflow: hidden;
            color: var(--text-color);
            user-select: none;
            -webkit-user-select: none;
        }

        .main-wrapper {
            width: 95%;
            max-width: 500px;
            height: 98vh;
            display: flex;
            flex-direction: column;
        }

        .tabs {
            display: flex;
            gap: 2px;
            margin-bottom: 5px;
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 1px;
            border: none;
            border-radius: 12px;
            background: var(--tab-inactive-bg);
            color: #555;
            font-family: inherit;
            font-weight: 800;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            white-space: nowrap;
        }

        .tab-btn.active {
            background: var(--tab-active-bg);
            color: var(--secondary-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }

        .game-container {
            flex-grow: 1;
            background: #f0f2ff;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            padding: 20px;
            box-sizing: border-box;
            display: none;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            animation: fadeIn 0.4s ease-out;
        }

        .game-container.active {
            display: flex;
        }

        h1 {
            margin: 0 0 5px 0;
            font-size: 1.5rem;
            color: #444;
            text-align: center;
            font-weight: 800;
        }

        p.instruction {
            font-size: 0.85rem;
            margin: 0 0 10px 0;
            color: #777;
            text-align: center;
            font-weight: 700;
            line-height: 1.4;
        }

        .mission-badge {
            background: #fff;
            border: 2px solid #6a11cb;
            color: #6a11cb;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 800;
            margin-bottom: 10px;
            display: inline-block;
            align-self: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .canvas-wrapper {
            position: relative;
            width: 100%;
            flex-grow: 1;
            min-height: 200px;
            background: white;
            border-radius: 20px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
            margin-bottom: 15px;
            overflow: hidden;
            cursor: pointer;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        .info-panel {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-shrink: 0;
        }

        .info-item {
            flex: 1;
            background: var(--card-bg);
            padding: 10px 5px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .info-label {
            font-size: 0.8rem;
            font-weight: 800;
            color: #666;
            margin-bottom: 2px;
        }

        .info-value {
            font-size: 1.6rem;
            font-weight: 800;
            color: #4a69bd;
            display: flex;
            align-items: baseline;
        }

        .unit {
            font-size: 0.8rem;
            margin-left: 2px;
            color: #888;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            padding-bottom: 0;
            flex-shrink: 0;
        }

        button.action-btn {
            border: none;
            outline: none;
            cursor: pointer;
            font-family: inherit;
            font-weight: 700;
            font-size: 0.95rem;
            padding: 12px 10px;
            border-radius: 50px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        button.action-btn:active {
            transform: scale(0.95);
        }

        .btn-check {
            background: var(--check-btn-gradient);
            color: white;
            flex: 2;
        }

        .btn-reset {
            background: #fff;
            color: #555;
            flex: 1;
        }

        .angle-marker {
            position: absolute; width: 20px; height: 20px; background-color: rgba(255, 75, 31, 0.6); border-radius: 50%; transform: translate(-50%, -50%) scale(0); pointer-events: none; transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .angle-marker.show { transform: translate(-50%, -50%) scale(1); }

        .hanamaru-img {
            width: 220px; height: 220px; object-fit: contain; position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%) scale(0) rotate(-20deg); opacity: 0; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none; z-index: 20; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.15));
        }
        .hanamaru-img.show { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
        
        /* 金のはなまる演出 */
        .hanamaru-img.gold {
            filter: drop-shadow(0 0 15px gold) brightness(1.2) sepia(0.5) saturate(3);
        }

        .feedback-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 30px; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 10; }
        .feedback-overlay.active { opacity: 1; pointer-events: auto; }
        .result-text { font-size: 2rem; font-weight: 800; margin-bottom: 20px; transform: scale(0.5); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); line-height: 1.4; text-align: center; z-index: 21; }
        .feedback-overlay.active .result-text { transform: scale(1); }

        /* 折り紙タブの特殊設定 */
        #origami_overlay { background: rgba(255, 255, 255, 0); }
        #origami_overlay .result-text { margin-top: 100px; margin-bottom: 50px; background: rgba(255, 255, 255, 0.85); padding: 5px 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #origami_overlay .action-btn { margin-top: 320px; }

        /* 図鑑タブのスタイル */
        .collection-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            overflow-y: auto;
            padding: 10px;
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 20px;
        }
        .collection-item {
            background: white;
            border-radius: 12px;
            padding: 8px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            animation: popIn 0.3s ease-out;
        }
        .collection-icon {
            width: 100%;
            height: 60px;
            margin-bottom: 5px;
            background: #f9f9f9;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .collection-label { font-size: 0.65rem; font-weight: 800; color: #555; }
        .collection-empty { grid-column: span 3; padding: 40px; color: #aaa; font-weight: 700; text-align: center; }

        /* その他UI */
        .angle-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10px; width: 100%; flex-grow: 1; margin-bottom: 10px; position: relative; }
        .angle-card { background: rgba(255, 255, 255, 0.8); border-radius: 12px; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer; border: 2px solid transparent; touch-action: none; }
        .angle-card.selected { background: rgba(37, 117, 252, 0.1); border: 2px solid var(--secondary-color); }
        .angle-label { position: absolute; bottom: 5px; left: 5px; background: white; border: 2px solid #ccc; border-radius: 50%; width: 24px; height: 24px; display: flex; justify-content: center; align-items: center; font-size: 0.85rem; font-weight: bold; color: #555; pointer-events: none; }
        .rank-badge { position: absolute; top: 5px; right: 5px; width: 28px; height: 28px; background: var(--accent-color); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 800; font-size: 1.1rem; transform: scale(0); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none; }
        .rank-badge.show { transform: scale(1); }
        #canvasAngleDrag { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }

        .stamp-area { margin-top: 10px; background: rgba(255, 255, 255, 0.7); border-radius: 15px; padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; height: 40px; }
        .stamp-container { display: flex; gap: 5px; align-items: center; overflow-x: auto; max-width: 70%; }
        .stamp-icon { font-size: 1.2rem; color: #f1c40f; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .stamp-count { font-weight: bold; color: #555; margin-right: 5px; font-size: 0.9rem; }
        .reset-stamp-btn { background: none; border: 1px solid #ccc; border-radius: 15px; padding: 4px 10px; font-size: 0.75rem; color: #666; cursor: pointer; }

        @keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .shake { animation: shake 0.3s ease-in-out; }

        @media (max-height: 600px) {
            h1 { display: none; }
            .canvas-wrapper { min-height: 150px; }
            .tab-btn { font-size: 0.8rem; padding: 8px 0; }
            .info-value { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('triangle')">形をつくる</button>
        <button class="tab-btn" onclick="switchTab('compass')">作図</button>
        <button class="tab-btn" onclick="switchTab('circle')">円でかく</button>
        <button class="tab-btn" onclick="switchTab('angle')">角くらべ</button>
        <button class="tab-btn" onclick="switchTab('origami')">折り紙</button>
        <button class="tab-btn" onclick="switchTab('collection')">図鑑</button>
    </div>

    <!-- GAME 1: 二等辺三角形メーカー -->
    <div id="game-triangle" class="game-container active">
        <div style="display: flex; flex-direction: column;">
            <h1>形をつくる</h1>
            <div id="tri_mission" class="mission-badge">ミッション: 辺ABを ---cm にしよう！</div>
            <p class="instruction">頂点を動かしてミッションに挑戦！</p>
        </div>
        <div class="info-panel">
            <div class="info-item"><span class="info-label">辺AB</span><span class="info-value" id="tri_dispAB">0<span class="unit">cm</span></span></div>
            <div class="info-item"><span class="info-label">辺AC</span><span class="info-value" id="tri_dispAC">0<span class="unit">cm</span></span></div>
            <div class="info-item"><span class="info-label">辺BC</span><span class="info-value" id="tri_dispBC">0<span class="unit">cm</span></span></div>
        </div>
        <div class="canvas-wrapper" id="tri_wrapper">
            <canvas id="canvasTriangle"></canvas>
            <div id="markerA" class="angle-marker"></div>
            <div id="markerB" class="angle-marker"></div>
            <div id="markerC" class="angle-marker"></div>
        </div>
        <div class="controls"><button class="action-btn btn-reset" onclick="TriGame.reset()">リセット</button><button class="action-btn btn-check" onclick="TriGame.check()">判定する！</button></div>
        <div id="tri_overlay" class="feedback-overlay">
            <img src="https://raw.githubusercontent.com/byakusen/hanamaru/refs/heads/main/hanamaru2.png" id="tri_hanamaru" class="hanamaru-img" alt="はなまる">
            <div class="result-text" id="tri_resultText"></div>
            <button class="action-btn" style="background:var(--secondary-color); color:white;" onclick="TriGame.hideOverlay()">とじる</button>
        </div>
    </div>

    <!-- GAME 2: 作図チャレンジ -->
    <div id="game-compass" class="game-container">
        <div><h1>作図チャレンジ</h1><p class="instruction" id="comp_instruction">指定の三角形をかこう！</p></div>
        <div class="canvas-wrapper" id="comp_wrapper" style="background: white;"><canvas id="canvasCompass"></canvas></div>
        <div class="controls"><button class="action-btn btn-reset" onclick="CompassGame.reset()">ランダム</button></div>
        <div id="comp_overlay" class="feedback-overlay"><div class="result-text" id="comp_resultText"></div><button class="action-btn" onclick="CompassGame.reset()">つぎへ</button></div>
    </div>

    <!-- GAME 3: 円でかく -->
    <div id="game-circle" class="game-container">
        <div><h1>円を使ってかこう</h1><p class="instruction" id="circle_instruction">半径 3 cm の円です。中心から線をひこう。</p></div>
        <div class="canvas-wrapper" id="circle_wrapper" style="background: white;"><canvas id="canvasCircle"></canvas></div>
        <div class="controls"><button class="action-btn btn-reset" onclick="CircleGame.reset()">ランダム</button></div>
        <div id="circle_overlay" class="feedback-overlay"><div class="result-text" id="circle_resultText"></div><button class="action-btn" onclick="CircleGame.reset()">つぎへ</button></div>
    </div>

    <!-- GAME 4: 角くらべ -->
    <div id="game-angle" class="game-container">
        <div><h1>角をくらべる</h1><p class="instruction">大きいじゅんに、角をえらぼう。ドラッグして重ねられるよ！</p></div>
        <div class="angle-grid" id="angle_grid">
            <canvas id="canvasAngleDrag"></canvas>
            <div class="angle-card" id="angle_card0"><canvas id="canvasAngle0"></canvas><div class="angle-label">A</div><div class="rank-badge" id="angle_badge0"></div></div>
            <div class="angle-card" id="angle_card1"><canvas id="canvasAngle1"></canvas><div class="angle-label">B</div><div class="rank-badge" id="angle_badge1"></div></div>
            <div class="angle-card" id="angle_card2"><canvas id="canvasAngle2"></canvas><div class="angle-label">C</div><div class="rank-badge" id="angle_badge2"></div></div>
            <div class="angle-card" id="angle_card3"><canvas id="canvasAngle3"></canvas><div class="angle-label">D</div><div class="rank-badge" id="angle_badge3"></div></div>
        </div>
        <div class="controls"><button class="action-btn btn-reset" onclick="AngleGame.reset()">やりなおす</button></div>
        <div id="angle_overlay" class="feedback-overlay"><img src="https://raw.githubusercontent.com/byakusen/hanamaru/refs/heads/main/hanamaru2.png" id="hanamaru_img" class="hanamaru-img" alt="はなまる"><div class="result-text" id="angle_resultText" style="margin-top: 130px;"></div><button class="action-btn" onclick="AngleGame.reset()">つぎへ</button></div>
    </div>

    <!-- GAME 5: 折り紙 -->
    <div id="game-origami" class="game-container">
        <div><h1>折り紙ひらき</h1><p class="instruction" id="origami_instruction">広げた形が「正三角形」になるのは？</p></div>
        <div class="canvas-wrapper" id="origami_wrapper" style="background: white; cursor: default;"><canvas id="canvasOrigami"></canvas></div>
        <div id="origami_choices" class="controls"></div>
        <div id="origami_overlay" class="feedback-overlay"><img src="https://raw.githubusercontent.com/byakusen/hanamaru/refs/heads/main/hanamaru2.png" id="hanamaru_img_origami" class="hanamaru-img" alt="はなまる"><div class="result-text" id="origami_resultText"></div><button class="action-btn" onclick="OrigamiGame.reset()">もう一度あそぶ</button></div>
    </div>

    <!-- GAME 6: 図鑑 -->
    <div id="game-collection" class="game-container">
        <div><h1>コレクション図鑑</h1><p class="instruction">集めた図形をみてみよう！<br>スタンプを10個集めるごとにレベルアップ！</p></div>
        <div class="collection-grid" id="collectionGrid">
            <div class="collection-empty">まだコレクションがないよ。<br>図形を完成させてね！</div>
        </div>
        <div class="controls"><button class="action-btn btn-reset" style="flex:1" onclick="switchTab('triangle')">あそびにもどる</button></div>
    </div>

    <!-- STAMP AREA -->
    <div class="stamp-area">
        <div class="stamp-container" id="stampContainer"><span class="stamp-count">スタンプ:</span></div>
        <button class="reset-stamp-btn" onclick="StampSystem.showResetConfirm()">リセット</button>
    </div>

    <!-- STAMP RESET DIALOG -->
    <div id="stampConfirmOverlay" class="feedback-overlay" style="background: rgba(0,0,0,0.6); z-index: 9999;">
        <div style="background: white; padding: 25px; border-radius: 20px; width: 80%; max-width: 300px;">
            <p style="font-weight: bold; margin: 0 0 20px 0;">スタンプを戻しますか？</p>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="action-btn" style="background: #eee;" onclick="StampSystem.cancelReset()">いいえ</button>
                <button class="action-btn" style="background: #ff4b1f; color: white;" onclick="StampSystem.executeReset()">はい</button>
            </div>
        </div>
    </div>

</div>

<script>
    const Sounds = {
        correct: new Audio('https://github.com/byakusen/gdlg.pinpon/raw/refs/heads/main/pinpon.mp3'),
        wrong: new Audio('https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg'),
        pop: new Audio('https://actions.google.com/sounds/v1/cartoon/pop.ogg'),
        hasami: new Audio('https://github.com/byakusen/gklelg.hasami_de_kamikiri/raw/refs/heads/main/hasami.mp3'),
        playCorrect: () => { Sounds.correct.currentTime = 0; Sounds.correct.play().catch(()=>{}); },
        playWrong: () => { Sounds.wrong.currentTime=0; Sounds.wrong.play().catch(()=>{}); },
        playPop: () => { Sounds.pop.currentTime=0; Sounds.pop.play().catch(()=>{}); },
        playHasami: () => { Sounds.hasami.currentTime = 0; Sounds.hasami.play().catch(()=>{}); }
    };

    function fireConfetti(isSuper) { 
        if (typeof confetti === 'function') { 
            const duration = isSuper ? 4000 : 3000, 
                  end = Date.now() + duration; 
            (function frame() { 
                confetti({ particleCount: isSuper ? 12 : 5, angle: 60, spread: 55, origin: { x: 0 }, colors: isSuper ? ['#FFD700', '#FFA500', '#FFFFFF'] : undefined }); 
                confetti({ particleCount: isSuper ? 12 : 5, angle: 120, spread: 55, origin: { x: 1 }, colors: isSuper ? ['#FFD700', '#FFA500', '#FFFFFF'] : undefined }); 
                if (Date.now() < end) requestAnimationFrame(frame); 
            }()); 
        } 
    }
    
    const StampSystem = (function() {
        const STORAGE_KEY = 'geometry_stamps'; const container = document.getElementById('stampContainer');
        let currentCount = 0;
        function load() { currentCount = parseInt(localStorage.getItem(STORAGE_KEY) || '0'); render(currentCount); }
        function add() { 
            currentCount++;
            localStorage.setItem(STORAGE_KEY, currentCount); 
            render(currentCount); 
            return { count: currentCount, isLevelUp: currentCount > 0 && currentCount % 10 === 0 };
        }
        function render(count) { container.innerHTML = `<span class=\"stamp-count\">スタンプ:</span>`; for(let i=0; i<Math.min(count, 8); i++) { const s = document.createElement('span'); s.className = 'stamp-icon'; s.innerHTML = '★'; container.appendChild(s); } if(count > 8) { const m = document.createElement('span'); m.style.color = '#f1c40f'; m.style.fontWeight = 'bold'; m.innerHTML = ` +${count - 8}`; container.appendChild(m); } }
        return { 
            load, add, getCount: () => currentCount,
            showResetConfirm:()=>document.getElementById('stampConfirmOverlay').classList.add('active'), 
            executeReset:()=>{ localStorage.setItem(STORAGE_KEY,'0'); currentCount = 0; render(0); document.getElementById('stampConfirmOverlay').classList.remove('active'); CollectionSystem.clear(); }, 
            cancelReset:()=>document.getElementById('stampConfirmOverlay').classList.remove('active') 
        };
    })();

    const CollectionSystem = (function() {
        const STORAGE_KEY = 'geometry_collection';
        let collections = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        
        function save(type, label) {
            const id = Date.now();
            collections.unshift({ id, type, label });
            if (collections.length > 30) collections.pop(); 
            localStorage.setItem(STORAGE_KEY, JSON.stringify(collections));
            render();
        }

        function render() {
            const grid = document.getElementById('collectionGrid');
            if (!grid) return;
            if (collections.length === 0) {
                grid.innerHTML = '<div class="collection-empty">まだコレクションがないよ。<br>図形を完成させてね！</div>';
                return;
            }
            grid.innerHTML = collections.map(item => `
                <div class="collection-item">
                    <div class="collection-icon">${getIcon(item.type)}</div>
                    <div class="collection-label">${item.label}</div>
                </div>
            `).join('');
        }

        function getIcon(type) {
            if(type === 'tri_equi') return '<svg width="40" height="40"><path d="M20 5 L35 35 L5 35 Z" fill="#6366f1" opacity="0.6" stroke="#4a69bd" stroke-width="2"/></svg>';
            if(type === 'tri_iso') return '<svg width="40" height="40"><path d="M20 5 L30 35 L10 35 Z" fill="#2ecc71" opacity="0.6" stroke="#27ae60" stroke-width="2"/></svg>';
            if(type === 'tri_long') return '<svg width="40" height="40"><path d="M20 5 L25 35 L15 35 Z" fill="#e74c3c" opacity="0.6" stroke="#c0392b" stroke-width="2"/></svg>';

        function getChordDist(ang1, ang2) { const x1 = Math.cos(ang1), y1 = Math.sin(ang1), x2 = Math.cos(ang2), y2 = Math.sin(ang2); return Math.hypot(x2-x1, y2-y1) * r_cm; }

        function draw() { ctx.clearRect(0,0,w,h); ctx.beginPath(); ctx.arc(cX, cY, r_px, 0, Math.PI*2); ctx.strokeStyle = '#999'; ctx.stroke(); ctx.beginPath(); ctx.arc(cX, cY, 5, 0, Math.PI*2); ctx.fillStyle = '#ff4b1f'; ctx.fill(); if(a1 !== null) { ctx.beginPath(); ctx.moveTo(cX, cY); ctx.lineTo(cX+r_px*Math.cos(a1), cY+r_px*Math.sin(a1)); ctx.strokeStyle='#6a11cb'; ctx.stroke(); } if(state === 'drawing1' && cA !== null) { ctx.setLineDash([5,5]); ctx.beginPath(); ctx.moveTo(cX, cY); ctx.lineTo(cX+r_px*Math.cos(cA), ctx.canvas.height/window.devicePixelRatio/2+r_px*Math.sin(cA)); ctx.stroke(); ctx.setLineDash([]); } if(state === 'drawing2' && cA !== null) { const x1 = cX+r_px*Math.cos(a1), y1 = cY+r_px*Math.sin(a1), x2 = cX+r_px*Math.cos(cA), y2 = cY+r_px*Math.sin(cA); ctx.beginPath(); ctx.moveTo(cX, cY); ctx.lineTo(x2, y2); ctx.stroke(); ctx.strokeStyle='#ff4b1f'; ctx.setLineDash([5,5]); ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke(); ctx.setLineDash([]); const dText = formatVal(getChordDist(a1, cA)); ctx.fillStyle='#d32f2f'; ctx.font = 'bold 30px "M PLUS Rounded 1c", sans-serif'; ctx.textAlign = 'center'; ctx.fillText(dText + 'cm', (x1+x2)/2, (y1+y2)/2); } if(state === 'completed' || state === 'anim') { const x1 = cX+r_px*Math.cos(a1), y1 = cY+r_px*Math.sin(a1), x2 = cX+r_px*Math.cos(a2), y2 = cY+r_px*Math.sin(a2); ctx.beginPath(); ctx.moveTo(cX, cY); ctx.lineTo(x2, y2); ctx.stroke(); const p = (state==='anim'?animP:1), dValue = getChordDist(a1, a2), isEq = Math.abs(dValue - r_cm) < 0.1; ctx.strokeStyle = isEq ? '#ff4b1f' : '#2ecc71'; ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x1+(x2-x1)*p, y1+(y2-y1)*p); ctx.stroke(); } }
        function animLoop() { animP += 0.04; if(animP >= 1) { state='completed'; draw(); setTimeout(()=>{ const dValue = parseFloat(formatVal(getChordDist(a1, a2))); const isEq = dValue === r_cm; resultText.innerHTML = isEq ? "正三角形" : "二等辺三角形"; Sounds.playCorrect(); fireConfetti(isEq); StampSystem.add(); overlay.classList.add('active'); }, 800); } else { draw(); requestAnimationFrame(animLoop); } }
        canvas.addEventListener('mousedown', e => { if(state==='completed') return; const r = canvas.getBoundingClientRect(); if(Math.hypot((e.clientX-r.left)-cX, (e.clientY-r.top)-cY)<40) state = (a1===null ? 'drawing1' : 'drawing2'); });
        canvas.addEventListener('mousemove', e => { if(state==='drawing1'||state==='drawing2') { const r = canvas.getBoundingClientRect(); let rawAngle = Math.atan2((e.clientY-r.top)-cY, (e.clientX-r.left)-cX); cA = rawAngle; if(state==='drawing2') { let diff = cA - a1; while (diff > Math.PI) diff -= Math.PI * 2; while (diff < -Math.PI) diff += Math.PI * 2; if (Math.abs(Math.abs(diff) - Math.PI/3) < 0.1) cA = a1 + (diff > 0 ? Math.PI/3 : -Math.PI/3); } draw(); } });
        window.addEventListener('mouseup', () => { if(state==='drawing1') { a1=cA; state='line1'; } else if(state==='drawing2') { a2=cA; state='anim'; animP=0; animLoop(); } });
        return { resize, reset };
    })();

    // --- GAME 4: Angle Game ---
    const AngleGame = (function() {
        const dragCanvas = document.getElementById('canvasAngleDrag'); const dragCtx = dragCanvas.getContext('2d'); const grid = document.getElementById('angle_grid');
        let items = [], currentRank = 1, draggingIdx = -1, isDragging = false, dragX = 0, dragY = 0, startX = 0, startY = 0;
        function gen() { let angles = [30, 70, 110, 150].map(v => v + Math.random()*20); angles.sort(()=>Math.random()-0.5); items = angles.map((ang, i) => ({ id: i, ang, rot: 0, l1: 40+Math.random()*20, l2: 40+Math.random()*20, rank: null })); currentRank = 1; }
        function initSize() { const dpr = window.devicePixelRatio || 1; dragCanvas.width = grid.clientWidth * dpr; dragCanvas.height = grid.clientHeight * dpr; dragCtx.scale(dpr, dpr); for(let i=0; i<4; i++) { const c = document.getElementById('angle_card'+i), cv = document.getElementById('canvasAngle'+i); if(!c || !cv) continue; cv.width = c.clientWidth*dpr; cv.height = c.clientHeight*dpr; cv.getContext('2d').scale(dpr, dpr); } }
        function drawSingle(ctx, cw, ch, item, isGhost = false) { ctx.clearRect(0, 0, cw, ch); ctx.save(); ctx.translate(cw/2, ch/2+5); ctx.rotate(0); ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(item.l1,0); ctx.moveTo(0,0); ctx.lineTo(item.l2*Math.cos(item.ang*Math.PI/180), item.l2*Math.sin(item.ang*Math.PI/180)); ctx.strokeStyle = isGhost ? 'rgba(37, 117, 252, 0.4)' : '#333'; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.stroke(); ctx.beginPath(); ctx.arc(0,0,4,0,Math.PI*2); ctx.fillStyle = isGhost ? 'rgba(255, 75, 31, 0.5)' : '#ff4b1f'; ctx.fill(); ctx.restore(); }
        function drawAll() { for(let i=0; i<4; i++) { const cv = document.getElementById('canvasAngle'+i); if(!cv)continue; const dpr = window.devicePixelRatio || 1; drawSingle(cv.getContext('2d'), cv.width/dpr, cv.height/dpr, items[i]); } }
        function drawDragGhost() { const dpr = window.devicePixelRatio || 1; dragCtx.clearRect(0, 0, dragCanvas.width/dpr, dragCanvas.height/dpr); if (isDragging && draggingIdx !== -1) { const item = items[draggingIdx]; dragCtx.save(); dragCtx.translate(dragX, dragY); dragCtx.beginPath(); dragCtx.moveTo(0,0); dragCtx.lineTo(item.l1, 0); dragCtx.moveTo(0,0); dragCtx.lineTo(item.l2*Math.cos(item.ang*Math.PI/180), item.l2*Math.sin(item.ang*Math.PI/180)); dragCtx.strokeStyle = 'rgba(37, 117, 252, 0.6)'; dragCtx.lineWidth = 6; dragCtx.lineCap = 'round'; dragCtx.stroke(); dragCtx.beginPath(); dragCtx.arc(0,0,6,0,Math.PI*2); dragCtx.fillStyle = 'rgba(255, 75, 31, 0.7)'; dragCtx.fill(); dragCtx.restore(); } }
        function setupEvents() {
            const handleStart = (e, idx) => { draggingIdx = idx; const r = grid.getBoundingClientRect(); const touch = e.touches ? e.touches[0] : e; startX = touch.clientX - r.left; startY = touch.clientY - r.top; dragX = startX; dragY = startY; isDragging = false; };
            const handleMove = (e) => { if (draggingIdx === -1) return; const r = grid.getBoundingClientRect(); const touch = e.touches ? e.touches[0] : e; const curX = touch.clientX - r.left; const curY = touch.clientY - r.top; if (!isDragging && Math.hypot(curX - startX, curY - startY) > 10) { isDragging = true; Sounds.playPop(); } if (isDragging) { dragX = curX; dragY = curY; drawDragGhost(); } };
            const handleEnd = (e) => { if (draggingIdx === -1) return; if (!isDragging) { selectRank(draggingIdx); } draggingIdx = -1; isDragging = false; const dpr = window.devicePixelRatio || 1; dragCtx.clearRect(0, 0, dragCanvas.width/dpr, dragCanvas.height/dpr); };
            for(let i=0; i<4; i++) { const card = document.getElementById('angle_card'+i); card.onmousedown = (e) => handleStart(e, i); card.ontouchstart = (e) => handleStart(e, i); }
            window.addEventListener('mousemove', handleMove); window.addEventListener('touchmove', handleMove); window.addEventListener('mouseup', handleEnd); window.addEventListener('touchend', handleEnd);
        }
        function selectRank(idx) { const item = items[idx]; if(item.rank !== null) { Sounds.playPop(); const old = item.rank; item.rank = null; document.getElementById('angle_card'+idx).classList.remove('selected'); document.getElementById('angle_badge'+idx).classList.remove('show'); currentRank--; items.forEach((it, i) => { if(it.rank > old) { it.rank--; document.getElementById('angle_badge'+i).textContent = it.rank; } }); return; } Sounds.playPop(); item.rank = currentRank; document.getElementById('angle_card'+idx).classList.add('selected'); const b = document.getElementById('angle_badge'+idx); b.textContent = currentRank; b.classList.add('show'); currentRank++; if(currentRank > 4) setTimeout(() => { let sorted = [...items].sort((a,b)=>a.rank-b.rank), win = true; for(let i=0; i<3; i++) if(sorted[i].ang < sorted[i+1].ang) win = false; if(win) { setTimeout(() => { Sounds.playCorrect(); fireConfetti(true); StampSystem.add(); document.getElementById('hanamaru_img').classList.add('show'); document.getElementById('angle_overlay').classList.add('active'); }, 800); } else { Sounds.playWrong(); document.getElementById('angle_overlay').classList.add('active'); } }, 400); }
        return { reset: () => { document.getElementById('angle_overlay').classList.remove('active'); document.getElementById('hanamaru_img').classList.remove('show'); gen(); setTimeout(() => { initSize(); drawAll(); setupEvents(); for(let i=0; i<4; i++){ const card = document.getElementById('angle_card'+i); if(card) card.classList.remove('selected'); const badge = document.getElementById('angle_badge'+i); if(badge) badge.classList.remove('show'); } }, 10); }, resize: () => { initSize(); if(items.length === 0) gen(); drawAll(); } };
    })();

    // --- GAME 5: Origami Game ---
    const OrigamiGame = (function() {
        const canvas = document.getElementById('canvasOrigami'); const ctx = canvas.getContext('2d'); const wrapper = document.getElementById('origami_wrapper'); const overlay = document.getElementById('origami_overlay'); const resultText = document.getElementById('origami_resultText'); const hanamaru = document.getElementById('hanamaru_img_origami'); const choiceContainer = document.getElementById('origami_choices');
        let width, height, state = 'folded', animationT = 0, selectedLen = 0, IU_CM = 4, PX_CM = 35, currentY_px = 0, targetY_px = 0, scissorP = 0, waitC = 0, fallP = 0;
        function resize() { width = wrapper.clientWidth; height = wrapper.clientHeight; const dpr = window.devicePixelRatio || 1; canvas.width = width * dpr; canvas.height = height * dpr; ctx.scale(dpr, dpr); draw(); }
        function genChoices() { const C = IU_CM * 2; const p = [[C,C+1,C+2],[C-1,C,C+1],[C-2,C-1,C]].filter(x => x[0] > IU_CM); const s = p[Math.floor(Math.random() * p.length)]; choiceContainer.innerHTML = ''; s.forEach(v => { const b = document.createElement('button'); b.className = 'action-btn'; b.style.background = '#fff'; b.style.flex = '1'; b.innerText = v + ' cm'; b.onclick = () => choose(v); choiceContainer.appendChild(b); }); }
        function drawScissor(x, y, ang, prog) { ctx.save(); ctx.translate(x, y); ctx.rotate(ang); const snap = (1 - prog % 0.2 / 0.2) * 0.2; for (let s of [-1, 1]) { ctx.save(); ctx.rotate(s * snap); ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(40, 0); ctx.strokeStyle = '#999'; ctx.lineWidth=3; ctx.stroke(); ctx.beginPath(); ctx.arc(-15, 0, 8, 0, Math.PI * 2); ctx.strokeStyle = '#444'; ctx.lineWidth = 5; ctx.stroke(); ctx.restore(); } ctx.restore(); }
        function draw() {
            ctx.clearRect(0, 0, width, height); const cy = height / 2 + 80 + (height * 0.1), cx = width / 2, iu_px = IU_CM * PX_CM;
            if (state !== 'opening' && state !== 'completed') {
                if (state !== 'falling' && state !== 'wait2') {
                    ctx.fillStyle = '#fff9c4'; ctx.fillRect(cx, cy - 350, 280, 350); ctx.strokeStyle = '#333'; ctx.lineWidth = 2; ctx.strokeRect(cx, cy - 350, 280, 350);
                } else {
                    ctx.fillStyle = '#fff9c4'; ctx.beginPath(); ctx.moveTo(cx, cy - currentY_px); ctx.lineTo(cx + iu_px, cy); ctx.lineTo(cx, cy); ctx.closePath(); ctx.fill(); ctx.strokeStyle = '#333'; ctx.stroke();
                    if (state === 'falling') {
                        ctx.save(); const offX = fallP * 80, offY = fallP * 80; ctx.translate(offX, offY); ctx.rotate(fallP * 0.2); ctx.globalAlpha = 1 - fallP;
                        ctx.fillStyle = '#fff9c4'; ctx.beginPath(); ctx.moveTo(cx, cy - currentY_px); ctx.lineTo(cx + iu_px, cy); ctx.lineTo(cx + 280, cy); ctx.lineTo(cx + 280, cy - 350); ctx.lineTo(cx, cy - 350); ctx.closePath(); ctx.fill(); ctx.strokeStyle = '#333'; ctx.stroke(); ctx.restore();
                    }
                }
                if (state === 'folded') { currentY_px = Math.sqrt((IU_CM*2)**2 - IU_CM**2) * PX_CM; }
                if (state !== 'falling' && state !== 'wait2') {
                    ctx.setLineDash([5, 5]); ctx.beginPath(); ctx.moveTo(cx, cy - currentY_px); ctx.lineTo(cx + iu_px, cy); ctx.strokeStyle = state==='folded'?'#ccc':'#ff4b1f'; ctx.stroke(); ctx.setLineDash([]);
                }
                ctx.fillStyle = '#333'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('A', cx - 15, cy - currentY_px + 5); ctx.fillText('B', cx - 15, cy + 25); ctx.fillText('C', cx + iu_px, cy + 25);
                ctx.font = 'bold 22px sans-serif'; ctx.fillText(IU_CM + 'cm', cx + iu_px/2, cy + 40 - (height * 0.03));
                if (state === 'cutting') { const sx = (cx + iu_px) + (cx - (cx + iu_px)) * scissorP, sy = cy + ( (cy - currentY_px) - cy ) * scissorP; drawScissor(sx, sy, Math.atan2((cy - currentY_px) - cy, cx - (cx + iu_px)), scissorP); }
            } else {
                const t = Math.min(1, animationT), flip = Math.cos(t * Math.PI); ctx.fillStyle = '#fff9c4'; ctx.beginPath(); ctx.moveTo(cx, cy - currentY_px); ctx.lineTo(cx + iu_px, cy); ctx.lineTo(cx, cy); ctx.closePath(); ctx.fill(); ctx.strokeStyle = '#333'; ctx.stroke();
                ctx.save(); ctx.translate(cx, 0); ctx.scale(flip, 1); ctx.fillStyle = '#fff9c4'; ctx.beginPath(); ctx.moveTo(0, cy - currentY_px); ctx.lineTo(iu_px, cy); ctx.lineTo(0, cy); ctx.closePath(); ctx.fill(); ctx.strokeStyle = '#333'; ctx.stroke(); ctx.restore();
                if (t >= 1) { ctx.fillStyle = '#d32f2f'; ctx.font = 'bold 16px sans-serif'; ctx.fillText(selectedLen + 'cm', cx - iu_px/2 - 35, cy - currentY_px/2); ctx.fillText(selectedLen + 'cm', cx + iu_px/2 + 35, cy - currentY_px/2); ctx.fillStyle = '#333'; ctx.font = 'bold 20px sans-serif'; ctx.fillText((IU_CM * 2) + 'cm', cx, cy + 30); }
            }
        }
        function choose(len) { selectedLen = len; state = 'adjusting'; animationT = 0; targetY_px = Math.sqrt(Math.max(0, len**2 - IU_CM**2)) * PX_CM; choiceContainer.style.pointerEvents = 'none'; anim(); }
        function anim() {
            if (state === 'adjusting') { const dy = targetY_px - currentY_px; if (Math.abs(dy) < 0.5) { currentY_px = targetY_px; state = 'wait1'; waitC = 0; } else { currentY_px += dy * 0.05; } }
            else if (state === 'wait1') { waitC++; if (waitC > 60) { state = 'cutting'; scissorP = 0; Sounds.playHasami(); } }
            else if (state === 'cutting') { scissorP += 0.007; if (scissorP >= 1) { scissorP = 1; state = 'falling'; fallP = 0; } }
            else if (state === 'falling') { fallP += 0.02; if (fallP >= 1) { state = 'wait2'; waitC = 0; Sounds.playPop(); } }
            else if (state === 'wait2') { waitC++; if (waitC > 60) { state = 'opening'; animationT = 0; } }
            else if (state === 'opening') { animationT += 0.025; if (animationT >= 1) { state = 'completed'; setTimeout(()=> { 
                const isCorrect = (selectedLen === IU_CM * 2); const res = StampSystem.add(); hanamaru.classList.toggle('gold', res.isLevelUp); if (isCorrect) { resultText.innerHTML = "正三角形"; resultText.className = "result-text success-gold"; Sounds.playCorrect(); fireConfetti(true); hanamaru.classList.add('show'); CollectionSystem.save('tri_equi', '正三角形（折り紙）'); } else { resultText.innerHTML = "二等辺三角形"; resultText.className = "result-text success"; Sounds.playWrong(); hanamaru.classList.remove('show'); document.getElementById('game-origami').classList.add('shake'); setTimeout(()=>document.getElementById('game-origami').classList.remove('shake'), 500); CollectionSystem.save('tri_iso', '二等辺三角形（折り紙）'); } if(res.isLevelUp) resultText.innerHTML += "<br><span style='color: gold; font-size: 1.2rem;'>★ レベルアップ！ ★</span>"; overlay.classList.add('active'); 
            }, 800); } }
            draw(); if (state !== 'completed') requestAnimationFrame(anim);
        }
        return { resize, choose, reset: () => { state = 'folded'; animationT = 0; scissorP = 0; waitC = 0; fallP = 0; choiceContainer.style.pointerEvents = 'auto'; overlay.classList.remove('active'); hanamaru.classList.remove('show'); IU_CM = [3, 4, 5][Math.floor(Math.random() * 3)]; genChoices(); draw(); } };
    })();

    window.onload = () => {
        StampSystem.load(); TriGame.resize(); CompassGame.reset(); CircleGame.reset(); AngleGame.reset(); OrigamiGame.reset(); CollectionSystem.render(); switchTab('triangle');
        window.addEventListener('resize', () => {
            const activeContainer = document.querySelector('.game-container.active');
            if(!activeContainer) return;
            const activeId = activeContainer.id.split('-')[1];
            if(activeId==='triangle') TriGame.resize(); else if(activeId==='compass') CompassGame.resize();
            else if(activeId==='circle') CircleGame.resize(); else if(activeId==='angle') AngleGame.resize();
            else if(activeId==='origami') OrigamiGame.resize();
            else if(activeId==='collection') CollectionSystem.render();
        });
    };
</script>
</body>
